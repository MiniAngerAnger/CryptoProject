# CryptoProject V1 — 配置中心
# 修改这里即可调整行为，无需动代码

price_feed:
  interval_seconds: 30          # 抓价格的频率
  symbols: ["BTC", "ETH", "SOL", "BNB"]  # 监控的币种
  source: "coingecko"           # 数据源：CoinGecko 公开 API（国内可访问，一次请求拿全部）

onchain_feed:
  interval_seconds: 5           # 区块轮询频率（Etherscan 免费版 5次/秒，5s 非常安全）
  whale_threshold_eth: 100      # 大额阈值：≥ 100 ETH 才记录
  source: "etherscan"

telegram:
  enabled: true
  threshold_usd: 1000000        # 只推送超过 100万 USD 的事件（避免刷屏）

database:
  path: "db/trading.db"         # SQLite 文件路径（相对项目根目录）

trading:
  enabled: true
  symbol: "BTC"
  interval_seconds: 30
  lookback: 180

strategy:
  mode: "hybrid"                # baseline | kronos | hybrid
  ema_fast: 9
  ema_slow: 21
  kronos_threshold: 0.003        # 0.3%

kronos:
  enabled: false                 # 先关闭；装好 Kronos 依赖后再开
  model_name: "NeoQuasar/Kronos-small"
  tokenizer_name: "NeoQuasar/Kronos-Tokenizer-base"
  lookback: 240
  pred_len: 12
  max_context: 512

paper_trading:
  initial_balance_usd: 10000
  fee_bps: 10                    # 0.10%
  slippage_bps: 5                # 0.05%

risk:
  max_notional_pct: 0.2          # 单笔最多用 20% 现金
  min_trade_usd: 50

sentiment:
  enabled: true
  interval_seconds: 300          # 每 5 分钟拉取一次（F&G 指数无需高频）
  min_news_score: -0.3           # news_score 低于此值时 buy 降级为 hold
  fear_greed_block_greed_above: 75  # F&G > 75 视为 extreme_greed，buy 信号降级为 hold

news:
  enabled: true
  interval_seconds: 3600         # 每小时一次（免费版 100次/天限额，24次/天安全）
  symbols: ["BTC", "ETH", "SOL", "BNB"]  # 仅用于记录，实际用宽泛查询一次覆盖

# 链上地址标签库（小写地址 → 可读名称）
address_tags:
  "0x4dbd4fc535ac27206064b68ffcf827b0a60bab3f": "🔶 币安-14 (Binance)"
  "0x28c6c06298d514db089934071355e5743bf21d60": "🔶 币安-热钱包"
  "0xdfd5293d8e347dfe59e90efd55b2956a1343963d": "💎 OKX-热钱包"
  "0x30273063529244030704423c46c1a4a870845b2e": "🐳 Upbit-巨鲸"
  "0x46456e20703f8f6ef8b6a70a8d79389369324021": "🏦 Jump Trading"
